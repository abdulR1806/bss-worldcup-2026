name: Validate leaderboard data

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate CSV data
        run: python scripts/validate_data.py

      - name: Test scoring
        run: python scripts/test_scoring.py

      - name: Test update results helpers
        run: python scripts/test_update_results_fallback.py

      - name: Test site data metadata
        run: python scripts/test_build_site_data.py

      - name: Build browser data
        run: python scripts/build_site_data.py

      - name: Confirm static site files exist
        run: |
          test -f site/index.html
          test -f site/styles.css
          test -f site/app.js
          test -f site/data/site-data.js
