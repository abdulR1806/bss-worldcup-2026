name: Sync final match scores

on:
  workflow_dispatch:
  schedule:
    - cron: "37 */6 * * *"

permissions:
  contents: write

jobs:
  sync-final-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compare FINAL scores with API data
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FOOTBALL_DATA_COMPETITION_CODE: "WC"
          FOOTBALL_DATA_SEASON: "2026"
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY || '123' }}
          THESPORTSDB_LEAGUE_ID: "4429"
        run: |
          set -o pipefail
          python scripts/update_results.py --sync-final-scores 2>&1 | tee sync-final-scores.log

      - name: Validate CSV data
        run: python scripts/validate_data.py

      - name: Test scoring
        run: python scripts/test_scoring.py

      - name: Test TheSportsDB fallback matching
        run: python scripts/test_update_results_fallback.py

      - name: Test site data metadata
        run: python scripts/test_build_site_data.py

      - name: Build browser data
        env:
          OFFICIAL_SCORE_SHEET_URL: ${{ secrets.OFFICIAL_SCORE_SHEET_URL || vars.OFFICIAL_SCORE_SHEET_URL || '' }}
          OFFICIAL_SCORE_SHEET_EMBED_URL: ${{ secrets.OFFICIAL_SCORE_SHEET_EMBED_URL || vars.OFFICIAL_SCORE_SHEET_EMBED_URL || '' }}
        run: python scripts/build_site_data.py

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-final-scores-log
          path: sync-final-scores.log
          if-no-files-found: warn

      - name: Commit corrected final scores
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync final World Cup scores from API"
          file_pattern: data/results.csv site/data/site-data.js
